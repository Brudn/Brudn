<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Cyber Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Share Tech Mono',monospace;
}

body{

background:#000;
overflow:hidden;
color:#00ff66;

}

/*================ VIDEO =================*/

video{

position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-5;

}

/*================ OVERLAY =================*/

.overlay{

position:fixed;
width:100%;
height:100%;
background:rgba(0,0,0,.72);

}

/*================ CRT =================*/

.crt{

position:fixed;
width:100%;
height:100%;
pointer-events:none;

background:
linear-gradient(
rgba(255,255,255,.03) 50%,
transparent 50%
);

background-size:100% 4px;

animation:flicker .15s infinite;

mix-blend-mode:overlay;

}

/*================ GLITCH =================*/

.glitch{

position:fixed;

width:100%;
height:100%;

background:rgba(0,255,0,.02);

animation:glitch 5s infinite;

pointer-events:none;

}

@keyframes glitch{

0%{

transform:translate(0);

}

5%{

transform:translate(-3px,2px);

}

6%{

transform:translate(3px,-2px);

}

7%{

transform:translate(0);

}

100%{

transform:translate(0);

}

}

@keyframes flicker{

0%{opacity:.92;}

50%{opacity:1;}

100%{opacity:.95;}

}

/*================ BOOT =================*/

#boot{

position:absolute;

width:100%;
height:100%;

background:#000;

padding:40px;

overflow:hidden;

display:flex;

flex-direction:column;

justify-content:center;

}

#terminal{

font-size:20px;

line-height:34px;

white-space:pre-line;

}

.progress{

margin-top:40px;

width:100%;

height:20px;

border:1px solid #00ff66;

}

.bar{

width:0%;

height:100%;

background:#00ff66;

box-shadow:0 0 20px #00ff66;

}

/*================ MAIN =================*/

#main{

display:none;

height:100vh;

justify-content:center;

align-items:center;

flex-direction:column;

text-align:center;

}

.title{

font-size:80px;

text-shadow:
0 0 10px #00ff66,
0 0 30px #00ff66,
0 0 70px #00ff66;

margin-bottom:20px;

}

.subtitle{

font-size:22px;

opacity:.8;

height:30px;

}

.cursor{

animation:blink .8s infinite;

}

@keyframes blink{

50%{

opacity:0;

}

}

/*================ MATRIX =================*/

canvas{

position:fixed;

top:0;

left:0;

width:100%;

height:100%;

z-index:-4;

}

.info{

position:absolute;

bottom:20px;

font-size:15px;

letter-spacing:3px;

}

</style>

</head>

<body>

<video autoplay muted loop>

<source src="yut.mp4" type="video/mp4">

</video>

<canvas id="matrix"></canvas>

<div class="overlay"></div>

<div class="glitch"></div>

<div class="crt"></div>

<div id="boot">

<div id="terminal"></div>

<div class="progress">

<div class="bar"></div>

</div>

</div>

<div id="main">

<h1 class="title">

CYBER SECURITY

</h1>

<div class="subtitle">

<span id="typing"></span>

<span class="cursor">|</span>

</div>

<div class="info">

PORTFOLIO • FULL STACK • CYBER ENTHUSIAST

</div>

</div>

<script>

/*============== MATRIX ==============*/

const canvas=document.getElementById("matrix");

const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;

canvas.height=window.innerHeight;

const letters="01ABCDEFGHIJKLMNOPQRSTUVWXYZ";

const fontSize=16;

const columns=canvas.width/fontSize;

const drops=[];

for(let i=0;i<columns;i++){

drops[i]=1;

}

function draw(){

ctx.fillStyle="rgba(0,0,0,.05)";

ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="#00ff66";

ctx.font=fontSize+"px monospace";

for(let i=0;i<drops.length;i++){

const text=letters[Math.floor(Math.random()*letters.length)];

ctx.fillText(text,i*fontSize,drops[i]*fontSize);

if(drops[i]*fontSize>canvas.height&&Math.random()>0.975)

drops[i]=0;

drops[i]++;

}

}

setInterval(draw,35);

/*============== BOOT ==============*/

const terminal=document.getElementById("terminal");

const bar=document.querySelector(".bar");

const lines=[

"Booting Kali Linux...",

"Checking hardware...",

"Loading Kernel Modules...",

"Initializing Network...",

"Starting Secure Services...",

"Mounting File System...",

"Launching Desktop...",

"Loading Cyber Portfolio..."

];

let index=0;

let progress=0;

function boot(){

if(index<lines.length){

terminal.innerHTML+=lines[index]+"<br>";

index++;

}

progress+=12;

bar.style.width=progress+"%";

if(progress<100){

setTimeout(boot,500);

}else{

setTimeout(startPortfolio,800);

}

}

boot();

/*============== TYPE WRITER ==============*/

function startPortfolio(){

document.getElementById("boot").style.display="none";

document.getElementById("main").style.display="flex";

const text="WELCOME TO MY CYBER PORTFOLIO";

let i=0;

function type(){

if(i<text.length){

document.getElementById("typing").innerHTML+=text.charAt(i);

i++;

setTimeout(type,70);

}

}

type();

}

</script>

</body>
</html>
